# Build and Deploy Docs - Testing GitHub Actions

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: docs-build-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout docs4.x
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10.4"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Build English
        working-directory: docs/en
        run: mkdocs build --site-dir ../../site/en

      - name: Build German
        working-directory: docs/de
        run: mkdocs build --site-dir ../../site/de

      - name: Build Spanish
        working-directory: docs/es
        run: mkdocs build --site-dir ../../site/es

      - name: Build Japanese
        working-directory: docs/jp
        run: mkdocs build --site-dir ../../site/jp

      - name: Checkout docs-build
        uses: actions/checkout@v4
        with:
          repository: gl-inet/docs-build
          ssh-key: ${{ secrets.DEPLOY_KEY }}
          path: docs-build
          clean: true
          fetch-depth: 0

      - name: Deploy English to docs-build
        run: |
          rm -rf docs-build/router/en/4
          mkdir -p docs-build/router/en/4
          cp -r site/en/. docs-build/router/en/4/

      - name: Deploy German to docs-build
        run: |
          rm -rf docs-build/router/de/4
          mkdir -p docs-build/router/de/4
          cp -r site/de/. docs-build/router/de/4/

      - name: Deploy Spanish to docs-build
        run: |
          rm -rf docs-build/router/es/4
          mkdir -p docs-build/router/es/4
          cp -r site/es/. docs-build/router/es/4/

      - name: Deploy Japanese to docs-build
        run: |
          rm -rf docs-build/router/jp/4
          mkdir -p docs-build/router/jp/4
          cp -r site/jp/. docs-build/router/jp/4/

      - name: Commit and Push to docs-build
        working-directory: ./docs-build
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if [ -n "$(git diff --cached --name-only)" ]; then
            git commit -m "docs4 build: $(git log -1 --format='%H')"
            git pull --rebase origin master
            git push
            echo "✅ Deployed successfully"
          else
            echo "ℹ️ No changes to deploy"
          fi
