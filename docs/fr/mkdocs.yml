repo_name: gl-inet/docs4.x
repo_url: https://github.com/gl-inet/docs4.x
edit_uri: ""

site_name: Documentation des routeurs GL.iNet 4
site_description: Documentation des produits routeur GL.iNet
site_author: GL.iNet
site_url: https://docs.gl-inet.com/router/fr/4/
site_dir: site
copyright: Copyright &copy; 2026 GL Technologies & Microuter Technologies

theme: 
  name: material
  language: fr
  logo: https://static.gl-inet.com/docs/router/common/logo_white.svg
  custom_dir: overrides
  features:
    - navigation.indexes
    - navigation.tabs
    - navigation.top
  favicon: https://static.gl-inet.com/docs/router/common/favicon.png

