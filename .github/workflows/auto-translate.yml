name: Auto Translate Docs

on:
  push:
    branches:
      - master
    paths:
      - docs/en/docs/**/*.md
  schedule:
    # 01:10 China time (UTC+8) = 17:10 UTC previous day
    - cron: "10 17 * * *"
  workflow_dispatch:
    inputs:
      force_full:
        description: Force full translation for all English markdown files
        required: false
        type: boolean
        default: false
      max_files:
        description: Limit number of source files for this run (0 means no limit)
        required: false
        type: number
        default: 0

permissions:
  contents: write

concurrency:
  group: auto-translate-docs
  cancel-in-progress: false

jobs:
  translate:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - name: Checkout docs4.x
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Detect changed English markdown files
        id: changed
        if: github.event_name == 'push'
        run: |
          CHANGED=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep '^docs/en/docs/.*\.md$' || true)
          RENAMED=$(git diff --name-status -M "${{ github.event.before }}" "${{ github.sha }}" | awk '$1 ~ /^R[0-9]+$/ && $2 ~ /^docs\/en\/docs\/.*\.md$/ && $3 ~ /^docs\/en\/docs\/.*\.md$/ { print $2 "\t" $3 }' || true)
          DELETED=$(git diff --name-status "${{ github.event.before }}" "${{ github.sha }}" | awk '$1 == "D" && $2 ~ /^docs\/en\/docs\/.*\.md$/ { print $2 }' || true)
          {
            echo "files<<EOF"
            echo "$CHANGED"
            echo "EOF"
            echo "renamed<<EOF"
            echo "$RENAMED"
            echo "EOF"
            echo "deleted<<EOF"
            echo "$DELETED"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run translation
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          FORCE_FULL: ${{ github.event_name == 'workflow_dispatch' && inputs.force_full || 'false' }}
          MAX_FILES: ${{ github.event_name == 'schedule' && '50' || (github.event_name == 'workflow_dispatch' && inputs.max_files || '0') }}
          CHANGED_EN_FILES: ${{ steps.changed.outputs.files }}
          RENAMED_EN_FILES: ${{ steps.changed.outputs.renamed }}
          DELETED_EN_FILES: ${{ steps.changed.outputs.deleted }}
        run: |
          python scripts/auto_translate_docs.py

      - name: Commit translation updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/de/docs docs/es/docs docs/fr/docs docs/it/docs docs/jp/docs docs/pl/docs .translation-cache.json
          if [ -n "$(git diff --cached --name-only)" ]; then
            git commit -m "chore(i18n): auto-translate from English"
            git push
            echo "Translated changes pushed"
          else
            echo "No translation changes"
          fi
